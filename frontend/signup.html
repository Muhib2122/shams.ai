<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

SHAMS AI Signup

</title>

<link
rel="stylesheet"
href="./css/auth.css">

</head>

<body>

<div class="container">

<img
src="../assets/logo.png"
width="120"
style="display:block;margin:auto;">

<h1>

Create Account

</h1>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="password"
id="password"
placeholder="Password">

<input
type="file"
id="profilePic">

<button id="signupBtn">

Create Account

</button>

<br><br>

<button id="googleBtn">

Continue with Google

</button>

<br><br>

<center>

Already have an account?

<a href="./login.html">

Login

</a>

</center>

</div>

<script
type="module"
src="./js/auth.js">

</script>

</body>

</html>
